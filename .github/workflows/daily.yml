name: Daily AI Agent

on:
  workflow_dispatch:
  schedule:
  - cron: "00 12 * * *"  # 每天 UTC 12:00，对应北京时间 20:00

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
  GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }} 
  MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
  SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Multi-Agent System
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python main.py
      - name: Send Email Report
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          if [ -z "$SMTP_SERVER" ] || [ -z "$SMTP_PORT" ] || [ -z "$SMTP_USERNAME" ] || [ -z "$SMTP_PASSWORD" ] || [ -z "$EMAIL_RECIPIENTS" ]; then
            echo "SMTP or email configuration missing; skipping email step."
            exit 0
          fi

          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import smtplib
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          smtp_server = os.getenv('SMTP_SERVER')
          smtp_port = int(os.getenv('SMTP_PORT', 587))
          smtp_username = os.getenv('SMTP_USERNAME')
          smtp_password = os.getenv('SMTP_PASSWORD')
          recipients = [r.strip() for r in os.getenv('EMAIL_RECIPIENTS', '').split(',') if r.strip()]

          if not recipients:
              raise ValueError('EMAIL_RECIPIENTS is not configured.')

          report_date = datetime.now(ZoneInfo('Asia/Shanghai')).strftime('%Y-%m-%d')
          report_path = f'reports/{report_date}.md'

          with open(report_path, 'r', encoding='utf-8') as f:
              report_content = f.read()

          msg = MIMEMultipart()
          msg['From'] = smtp_username
          msg['To'] = ', '.join(recipients)
          msg['Subject'] = f'AI Research Report - {report_date}'
          msg.attach(MIMEText(report_content, 'plain', 'utf-8'))

          server = smtplib.SMTP(smtp_server, smtp_port)
          server.starttls()
          server.login(smtp_username, smtp_password)
          server.sendmail(smtp_username, recipients, msg.as_string())
          server.quit()

          print('Email sent successfully!')
          PY
      - name: Commit report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/

          git commit -m "chore: daily AI report update" || echo "No changes to commit"

          git push
